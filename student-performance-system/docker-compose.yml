version: '3.8'

services:
  # AI Service (Python Flask)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: student-performance-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
    depends_on:
      - backend
    networks:
      - student-performance-network

  # Backend API (Node.js) with built-in MongoDB
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-performance-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "27017:27017"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://localhost:27017/studentDB
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - backend_data:/data/db
    depends_on:
      - ai-service
    networks:
      - student-performance-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-performance-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_AI_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - student-performance-network

volumes:
  backend_data:

networks:
  student-performance-network:
    driver: bridge